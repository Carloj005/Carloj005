name: Generate Snake

on:
  schedule:
    # Si aggiorna ogni giorno a mezzanotte
    - cron: "0 0 * * *"
  # Permette di avviarlo manualmente dal tab Actions
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?color_snake=#BA55D3&color_dots=#0d0d0d,#4f006e,#7b2ff2,#8e44ad,#ba55d3

      - uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
